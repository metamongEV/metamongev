<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metamongEV — Beezie EV Pulse</title>
    <meta name="description" content="Live Beezie claw EV monitor — pulls-to-+EV, average value, BEP, and top grails per pack." />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="topbar__inner">
          <a class="brand" href="/" aria-label="metamongEV home">
            <span class="brand__avatar" role="img" aria-label="metamongEV logo">
              <img src="./assets/logo.jpg" alt="" onerror="this.style.display='none'" />
            </span>
            <span class="brand__name">metamongEV</span>
          </a>

          <nav class="topbar__links" aria-label="External resources">
            <a class="link-pill link-pill--gold" href="https://beezie.com/r/X9P8WVMA" target="_blank" rel="noopener noreferrer">
              Join Beeze via referral to get 0.5% direct cashback without limit!
            </a>
            <a class="link-pill link-pill--with-icon" href="#" aria-disabled="true" data-empty title="metamongEV Telegram chat (coming soon)">
              <svg class="link-pill__glyph" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21.96 4.84 18.5 19.7c-.26 1.13-.93 1.4-1.88.87l-5.21-3.84-2.51 2.41c-.28.28-.51.51-1.04.51l.37-5.27 9.6-8.67c.42-.37-.09-.58-.65-.21L5.32 12.92.21 11.31c-1.11-.34-1.13-1.11.23-1.64L20.55 2.4c.93-.34 1.74.22 1.41 2.44z"/>
              </svg>
              TG
            </a>
            <a class="link-pill link-pill--with-icon" href="#" aria-disabled="true" data-empty title="Telegram tracker (coming soon)">
              <svg class="link-pill__glyph" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21.96 4.84 18.5 19.7c-.26 1.13-.93 1.4-1.88.87l-5.21-3.84-2.51 2.41c-.28.28-.51.51-1.04.51l.37-5.27 9.6-8.67c.42-.37-.09-.58-.65-.21L5.32 12.92.21 11.31c-1.11-.34-1.13-1.11.23-1.64L20.55 2.4c.93-.34 1.74.22 1.41 2.44z"/>
              </svg>
              Telegram Tracker
            </a>
            <a class="link-pill link-pill--icon" href="https://x.com/metamongEV" target="_blank" rel="noopener noreferrer" aria-label="metamongEV on X">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.244 2H21.5l-7.35 8.4L22.5 22h-6.8l-5.32-6.88L4.2 22H.93l7.8-8.9L1.5 2h6.89l4.8 6.35L16.4 2h1.844zm-1.22 17.58h1.89L6.92 4h-1.9l11.99 15.58z" />
              </svg>
            </a>
          </nav>
        </div>
      </header>

      <main class="content">
        <section class="panel">
          <div class="panel__head">
            <div class="panel__eyebrow">EV monitor — Beezie packs</div>
            <div class="panel__controls">
              <button id="alarmToggle" type="button" class="alarm-btn" aria-pressed="true" aria-label="Alarm on +EV — currently on" title="Alarm on +EV">
                <svg class="alarm-icon alarm-icon--on" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg>
                <svg class="alarm-icon alarm-icon--off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z" />
                </svg>
              </button>
              <span class="meta meta--refresh">
                <span class="meta__label">Refresh</span>
                <span id="refreshCountdown">10s</span>
                <span class="live-dot" aria-hidden="true"></span>
              </span>
              <span class="meta">
                <span class="meta__label">Last sync</span>
                <span id="lastSync">—</span>
              </span>
            </div>
          </div>

          <div class="table-wrap">
            <table class="grid grid--beezie">
              <colgroup>
                <col class="col--pack" />
                <col class="col--progress" />
                <col class="col--pulls" />
                <col class="col--avg" />
                <col class="col--ev-pct" />
                <col class="col--ev-usd" />
                <col class="col--bep" />
                <col class="col--price" />
                <col class="col--buyback" />
                <col class="col--items" />
              </colgroup>
              <thead>
                <tr>
                  <th class="text-left">Pack</th>
                  <th class="text-left" title="Distance to BEP — fills when the remaining pool's average crosses break-even.">Progress</th>
                  <th class="text-right" title="Estimated remaining base-tier pulls before the remaining pool's average value crosses BEP.">Pulls&nbsp;to&nbsp;+EV</th>
                  <th class="text-right" title="totalSwapValue / stock / 0.9">Avg&nbsp;Value</th>
                  <th class="text-right" title="(Avg Value − BEP) / BEP">%EV</th>
                  <th class="text-right" title="Avg Value − BEP">$EV</th>
                  <th class="text-right" title="Beezie BEP table or 1.14 × price.">BEP</th>
                  <th class="text-right">Price</th>
                  <th class="text-right" title="Beezie 90% sell × (1 − 6% swap fee) ≈ 84.6%">Buyback</th>
                  <th class="text-right">Items</th>
                </tr>
              </thead>
              <tbody id="rows">
                <tr class="row-empty">
                  <td colspan="10">Loading Beezie packs…</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="panel__foot">
            <span id="dataState" class="meta meta--state">connecting…</span>
          </div>
        </section>
      </main>
    </div>

    <aside id="presenceWidget" class="presence" aria-live="polite" aria-label="Live online viewers">
      <span class="live-dot" aria-hidden="true"></span>
      <span class="presence__count" id="onlineCount">—</span>
      <span class="presence__label">online</span>
    </aside>

    <script src="./script.js"></script>
  </body>
</html>
